name: Publish Packages

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      is_prerelease:
        required: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish to GitHub Packages
      run: |
        echo "Publishing version ${{ inputs.version }} to GitHub Packages"
        for package in ./artifacts/*.nupkg; do
          echo "Pushing $package to GitHub Packages..."
          dotnet nuget push "$package" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
        done

    - name: Publish to NuGet.org (main or tags only)
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/')
      run: |
        echo "Publishing to NuGet.org"
        for package in ./artifacts/*.nupkg; do
          dotnet nuget push "$package" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        done
